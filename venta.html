<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Venta | Cambio y Venta EC</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <main style="max-width: 1000px; margin: 60px auto; padding: 0 20px; text-align: center;">
        <h1 style="color: white; font-size: 2.5rem; margin-bottom: 10px;">💰 SECCIÓN DE VENTA</h1>
        <p style="color: #a0a5b0; margin-bottom: 40px;">¿Qué tipo de producto deseas publicar para la venta hoy?</p>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
            
            <div style="background-color: #1a1e23; padding: 30px; border-radius: 15px; border-top: 4px solid #498e52;">
                <h2 style="color: white; margin-bottom: 20px;"><i class="fas fa-star" style="color: #498e52;"></i> Artículos Nuevos</h2>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <a href="venta-nuevo-juegos.html" style="background-color: #242930; color: white; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; display: block;">
                        <i class="fas fa-gamepad"></i> Vender Juegos Nuevos
                    </a>
                    <a href="venta-nuevo-consolas.html" style="background-color: #242930; color: white; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; display: block;">
                        <i class="fas fa-desktop"></i> Vender Consolas Nuevas
                    </a>
                </div>
            </div>

            <div style="background-color: #1a1e23; padding: 30px; border-radius: 15px; border-top: 4px solid #c09d60;">
                <h2 style="color: white; margin-bottom: 20px;"><i class="fas fa-recycle" style="color: #c09d60;"></i> Artículos Usados</h2>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <a href="venta-usado-juegos.html" style="background-color: #242930; color: white; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; display: block;">
                        <i class="fas fa-gamepad"></i> Vender Juegos Usados
                    </a>
                    <a href="venta-usado-consolas.html" style="background-color: #242930; color: white; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; display: block;">
                        <i class="fas fa-desktop"></i> Vender Consolas Usadas
                    </a>
                </div>
            </div>

        </div>
    </main>
<button onclick="window.history.back();" class="btn-back-floating" title="Volver a la página anterior">
    <i class="fas fa-arrow-left"></i> Volver
</button>
</body>
</html>
